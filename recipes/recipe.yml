---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: bluevelvet
# description will be included in the image's metadata
description: 这是我的个人系统映像

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia-gnome
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  # 添加系统配置
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  # 注入内核参数
  - type: kargs
    kargs:
      - hid_apple.fnmode=2
      - systemd.zram=0
      - zswap.enabled=1
      - zswap.shrinker_enabled=1

  # 添加字体
  - type: fonts
    fonts:
      url-fonts:
        - name: 更纱黑体 UI SC
          url: https://github.com/be5invis/Sarasa-Gothic/releases/download/v1.0.37/SarasaUiSC-TTF-1.0.37.7z

  # 通过 DNF 安装
  - type: dnf
    install:
      packages:
        - uxplay
        - ibus-rime
        - https://github.com/xishang0128/sparkle/releases/download/1.26.3/sparkle-linux-1.26.3-x86_64.rpm

  # 通过 Flatpak 安装
  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        repo:
          title: flathub
          name: Flathub 中科大镜像
          url: https://mirrors.ustc.edu.cn/flathub
        install: # system flatpaks we want all users to have and not remove
          - app.drey.Dialect
          - app.fotema.Fotema
          - info.febvre.Komikku
          - it.mijorus.gearlever
          - org.zotero.Zotero
          - org.gnome.Maps
          - org.gnome.Fractal
          - org.gnome.World.PikaBackup
          - org.localsend.localsend_app
          - io.github.flattool.Ignition
          - io.github.Foldex.AdwSteamGtk
          - io.github.IshuSinghSE.aurynk
          - io.github.ilya_zlobintsev.LACT
          - io.github.Faugus.faugus-launcher
          - io.mpv.Mpv
          - com.gopeed.Gopeed
          - com.bitwarden.desktop
          - com.sidevesh.Luminance
          - net.trowell.typesetter
          - org.qbittorrent.qBittorrent
          - com.github.wwmm.easyeffects
          - io.github.totoshko88.RustConn
          - re.sonny.Tangram
          - com.github.johnfactotum.Foliate
          - net.shadps4.shadPS4

  # 添加 GNOME 扩展
  - type: gnome-extensions
    install:
      - UXPlay Control

  # 签名 OCI 镜像
  - type: signing # this sets up the proper policy & signing files for signed images to work fully
