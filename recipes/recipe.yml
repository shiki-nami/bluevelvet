---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: bluevelvet
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/bazzite-dx-nvidia-gnome
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  # 添加系统配置
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  # 注入内核参数
  - type: kargs
    kargs:
      - hid_apple.fnmode=2

  # 添加字体
  - type: fonts
    fonts:
      url-fonts:
        - name: 更纱黑体 UI SC
          url: https://github.com/be5invis/Sarasa-Gothic/releases/download/v1.0.36/SarasaUiSC-TTF-1.0.36.7z

  # 通过 DNF 安装
  - type: dnf
    install:
      packages:
        - Cider
        - uxplay
        - ibus-rime
        - https://github.com/xishang0128/sparkle/releases/download/1.26.2/sparkle-linux-1.26.2-x86_64.rpm

  # 通过 Flatpak 安装
  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - cool.ldr.lfy
          - page.tesk.Refine
          - app.fotema.Fotema
          - info.febvre.Komikku
          - it.mijorus.gearlever
          - org.zotero.Zotero
          - org.gnome.Fractal
          - org.gnome.World.PikaBackup
          - org.localsend.localsend_app
          - io.github.flattool.Ignition
          - io.github.Foldex.AdwSteamGtk
          - io.github.IshuSinghSE.aurynk
          - io.github.ilya_zlobintsev.LACT
          - io.github.Faugus.faugus-launcher
          - io.github.celluloid_player.Celluloid
          - io.github.giantpinkrobots.varia
          - app.zen_browser.zen
          - com.bitwarden.desktop
          - com.sidevesh.Luminance
          - net.trowell.typesetter
          - org.qbittorrent.qBittorrent
        remove:
          - org.mozilla.firefox
          - org.altlinux.Tuner

  # 添加 GNOME 扩展
  - type: gnome-extensions
    install:
      - UXPlay Control

  # 通过 Homebrew 安装
  - type: systemd
    user:
      enabled:
        - setup-brew.service

  # 签名 OCI 镜像
  - type: signing # this sets up the proper policy & signing files for signed images to work fully